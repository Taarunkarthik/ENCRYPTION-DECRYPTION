version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: encryption-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://frontend}
    volumes:
      - /tmp/multipart:/tmp/multipart
    depends_on:
      - frontend
    networks:
      - encryption-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: encryption-frontend
    ports:
      - "80:80"
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    networks:
      - encryption-network

networks:
  encryption-network:
    driver: bridge
